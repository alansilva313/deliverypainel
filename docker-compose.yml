name: deliverypainel-release1-1-3-fixed

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fogo_delivery}
      POSTGRES_USER: ${POSTGRES_USER:-fogo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fogo_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-fogo} -d ${POSTGRES_DB:-fogo_delivery}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    networks: [delivery_net]

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fogo}:${POSTGRES_PASSWORD:-fogo_dev_password}@postgres:5432/${POSTGRES_DB:-fogo_delivery}?schema=public
      JWT_SECRET: ${JWT_SECRET:-troque-esta-chave-em-producao}
      NODE_ENV: production
      AUTO_SEED: ${AUTO_SEED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    networks: [delivery_net]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5181}:80"
    restart: unless-stopped
    networks: [delivery_net]

volumes:
  postgres_data:

networks:
  delivery_net:
    name: deliverypainel_release113_network
